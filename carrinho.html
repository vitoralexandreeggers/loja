<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - GameStore</title>
    <link rel="stylesheet" href="carrinho.css">
</head>
<body class="corpocarrinho">
    <header class="cabeca">
        <h1 class="logo">SISTEMA CARRINHO</h1>
        <a href="index.html" class="butao"> VOLTAR </a>
    </header>

    <main class="euamogiovana">
        <div class="listaprodutos" id="lista-carrinho">
            <p style="padding: 20px;">Seu carrinho está vazio.</p>
        </div>
        <aside class="resumo">
            <h2>RESUMO DA COMPRA</h2>
            <div class="totalbox">
                <p>TOTAL: <span id="total-valor">R$ 0,00</span></p>
            </div>
            <button class="butao">CONFIRMAR COMPRA</button>
        </aside>
    </main>

    <footer class="pe">
        <p>CONSOLE_SYSTEM v1.0 - 2026</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
