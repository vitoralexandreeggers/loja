<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - GameStore</title>
    <link rel="stylesheet" href="carrinho.css">
</head>
<body class="corpocarrinho">

    <header class="cabeca">
        <h1 class="logo">SISTEMA CARRINHO</h1>
        <a href="index.html" class="butao"> VOLTAR </a>
    </header>

    <main class="euamogiovana">
        <div class="listaprodutos">
            <div class="giovana">
                <img src="imagems/ps2.png" alt="PS2">
                <div class="detalhesitem">
                    <h3>PLAYSTATION 2</h3>
                    <p>VALOR: R$ 50,00</p>
                    <button class="butao">REMOVER</button>
                </div>
            </div>

            <div class="giovana">
                <img src="imagems/dreamcast.png" alt="Dreamcast">
                <div class="detalhesitem">
                    <h3>SEGA DREAMCAST</h3>
                    <p>VALOR: R$ 456.456,00</p>
                    <button class="butao">REMOVER</button>
                </div>
            </div>
        </div>

        <aside class="resumo">
            <h2>RESUMO DA COMPRA</h2>
            <div class="totalbox">
                <p>TOTAL: <span>R$ 456.506,00</span></p>
            </div>
            <button class="butao">CONFIRMAR COMPRA</button>
        </aside>
    </main>

    <footer class="pe">
        <p>CONSOLE_SYSTEM v1.0 - 2026</p>
    </footer>

</body>
</html>
