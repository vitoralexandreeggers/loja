<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto</title>
    <link rel="stylesheet" href="produto.css">
</head>
<body>

<header class="cabeca">
    <h1>Loja</h1>
</header>

<main class="produto-container">

    <div class="produto-img">
        <img id="imagem-produto" src="" alt="Produto">
    </div>

    <div class="produto-info">
        <h1 id="nome-produto">Nome do Produto</h1>

        <p id="preco-produto" class="preco">R$ 0,00</p>

        <p id="descricao-produto" class="descricao">
            Descrição do produto vai aparecer aqui.
        </p>

        <button class="btn-comprar">Comprar</button>
        <button class="btn-carrinho">Adicionar ao carrinho</button>
    </div>

</main>

<section class="detalhes">
    <h2>Detalhes do Produto</h2>
    <p id="detalhes-produto">
        Mais informações sobre o produto.
    </p>
</section>

<footer class="pe">
    <h2>Essa loja é legal</h2>
    <div class="footer-bottom">
        <p>&copy; 2026. Todos os direitos reservados.</p>
    </div>  
</footer>

<script src="produto.js"></script>
</body>
</html>
