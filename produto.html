<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Console - Sistema</title>
    <link rel="stylesheet" href="produto.css">
</head>
<body>

<header class="cabeca">
    <h1 class="logo">CONSOLE INFO</h1>
    <a href="index.html" class="butao"> VOLTAR </a>
</header>

<main class="giovanaminhamusa">

    <div class="molduraimg">
        <img id="imagemproduto" src="" alt="Console">
    </div>

    <div class="vitor">
        <h1 id="nomeproduto">CARREGANDO...</h1>

        <p id="precoproduto" class="preco">R$ 0,00</p>

        <p id="descricaoproduto" class="descricao">
            Aguardando processamento de dados...
        </p>

        <div class="botoes">
            <button class="butao" id="btncomprar">COMPRAR AGORA</button>
            <button class="butao" id="btncarrinho">ADD AO CARRINHO</button>
        </div>
    </div>

</main>

<section class="detalhes">
    <h2>ESPECIFICACOES TECNICAS</h2>
    <p id="detalhesproduto">
        Dados adicionais do sistema...
    </p>
</section>

<footer class="pe">
    <div class="footerbottom">
        <p>VITOR SYSTEM v2.0</p>
    </div>  
</footer>

<script src="produto.js"></script>
</body>
</html>
