<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>

<header class="cabeca">
    <h1 class="logo">Loja</h1>

    <a href="carrinho.html" class="btn-carrinho-header">🛒 Carrinho</a>

</header>

<main class="container">

    <form class="form-cadastro" id="formCadastro">

        <h2>Crie sua conta</h2>

        <div class="campo">
            <label>Nome completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="campo">
            <label>Email</label>
            <input type="email" id="email" placeholder="Digite seu email" required>
        </div>

        <div class="campo">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha" required>
        </div>

        <div class="campo">
            <label>Confirmar senha</label>
            <input type="password" id="confirmarSenha" placeholder="Confirme sua senha" required>
        </div>

        <button type="submit" class="btn-cadastrar">
            Cadastrar
        </button>

        <p class="login-link">
            Já tem conta? <a href="#">Entrar</a>
        </p>

    </form>

</main>

<footer class="footer">
    <div class="footer-bottom">
        <p>&copy; 2026. Todos os direitos reservados.</p>
    </div>
</footer>

<script src="cadastro.js"></script>
</body>
</html>
